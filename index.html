<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0e0720" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hechizo" />
  <title>Hechizo Bijou</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0720; --surface: #1a1030; --card: #231540;
      --accent: #c084fc; --accent2: #818cf8; --gold: #fbbf24;
      --danger: #f87171; --success: #34d399;
      --text: #f1e9ff; --muted: #9d8ec0; --border: rgba(192,132,252,0.15);
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100dvh; display: flex; flex-direction: column;
    }
    header {
      padding: calc(env(safe-area-inset-top, 0px) + 20px) 20px 0;
      background: linear-gradient(180deg, #1a0a2e 0%, transparent 100%);
      position: relative; z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .brand-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif; font-size: 18px; color: #fff; flex-shrink: 0;
    }
    .brand-name { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); }
    .brand-sub { font-size: 11px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-left: 46px; }
    .tabs-wrap { padding: 16px 20px 0; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
    .tabs-wrap::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 13px;
      color: var(--muted); border: 1px solid var(--border); background: transparent;
      cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
    }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 500; }
    main { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .hero-card {
      background: linear-gradient(135deg, #2d1060 0%, #1e0a4e 100%);
      border: 1px solid var(--border); border-radius: 20px; padding: 20px;
      position: relative; overflow: hidden;
    }
    .hero-card::before {
      content: ''; position: absolute; top: -40px; right: -40px;
      width: 140px; height: 140px; border-radius: 50%;
      background: radial-gradient(circle, rgba(192,132,252,0.2) 0%, transparent 70%);
    }
    .hero-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    .hero-value { font-family: 'DM Serif Display', serif; font-size: 36px; color: var(--text); line-height: 1; margin-bottom: 4px; }
    .hero-margin { font-size: 13px; color: var(--muted); }
    .hero-margin span { color: var(--success); font-weight: 500; }
    .kpi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px; }
    .kpi-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .kpi-value { font-size: 18px; font-weight: 500; color: var(--text); }
    .kpi-value.neg { color: var(--danger); }
    .section-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
    .breakdown-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    .breakdown-row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); gap: 10px; }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-bar-wrap { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .breakdown-name { font-size: 13px; color: var(--text); }
    .breakdown-track { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
    .breakdown-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
    .breakdown-val { font-size: 13px; font-weight: 500; color: var(--danger); text-align: right; white-space: nowrap; }
    footer { padding: 12px 20px; padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 12px); text-align: center; }
    .updated-label { font-size: 11px; color: var(--muted); }
    .refresh-btn {
      margin-top: 8px; padding: 8px 20px; border-radius: 20px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer;
    }
    .state-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 40px; }
    .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-text { font-size: 14px; color: var(--muted); text-align: center; }

    /* Login screen */
    .login-screen {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 24px; padding: 40px;
    }
    .login-logo {
      width: 72px; height: 72px; border-radius: 20px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif; font-size: 36px; color: #fff;
    }
    .login-title { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--text); text-align: center; }
    .login-sub { font-size: 14px; color: var(--muted); text-align: center; line-height: 1.6; }
    .google-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 24px; border-radius: 12px;
      border: 1px solid var(--border); background: var(--card);
      color: var(--text); font-size: 15px; font-family: 'DM Sans', sans-serif;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: background 0.2s;
    }
    .google-btn:active { background: var(--surface); }
    .google-icon { width: 20px; height: 20px; }

    .retry-btn {
      padding: 10px 24px; border-radius: 20px;
      border: 1px solid var(--accent); background: transparent;
      color: var(--accent); font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="screen-login" class="login-screen hidden">
    <div class="login-logo">H</div>
    <div class="login-title">Hechizo Bijou</div>
    <div class="login-sub">Iniciá sesión con tu cuenta de Google<br>para ver el estado de resultados.</div>
    <button class="google-btn" onclick="loginGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continuar con Google
    </button>
  </div>

  <!-- LOADING -->
  <div id="screen-loading" class="state-screen">
    <div class="spinner"></div>
    <p class="state-text">Cargando Hechizo...</p>
  </div>

  <!-- ERROR -->
  <div id="screen-error" class="state-screen hidden">
    <p class="state-text" id="error-msg">No se pudo cargar la información.</p>
    <button class="retry-btn" onclick="cargarDatos()">Reintentar</button>
    <button class="retry-btn" style="margin-top:4px;border-color:var(--muted);color:var(--muted)" onclick="cerrarSesion()">Cambiar cuenta</button>
  </div>

  <!-- CONTENT -->
  <div id="screen-content" class="hidden">
    <header>
      <div class="brand">
        <div class="brand-icon">H</div>
        <div class="brand-name">Hechizo Bijou</div>
      </div>
      <div class="brand-sub">Estado de resultados</div>
    </header>
    <div class="tabs-wrap" id="tabs"></div>
    <main id="main-content"></main>
    <footer>
      <div class="updated-label" id="updated-label"></div>
      <button class="refresh-btn" onclick="cargarDatos()">↻ Actualizar</button>
    </footer>
  </div>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async></script>

  <script>
    // ═══════════════════════════════════════════════
    //  CONFIGURACIÓN — reemplazá estos dos valores
    // ═══════════════════════════════════════════════
    const CLIENT_ID  = "TU_CLIENT_ID.apps.googleusercontent.com";
    const SHEET_ID   = "1nUWfj9u0y7M7n2fNG6v55WnIxAedPpBxQZFUXk28nlI";
    const SHEET_NAME = "Hoja 1";
    // ═══════════════════════════════════════════════

    const LABELS = {
      "Ingresos":                   { label: "Ingresos",          tipo: "ingreso" },
      "Costo de Mercaderia":        { label: "Costo mercadería",  tipo: "egreso"  },
      "Costo de Mercadería":        { label: "Costo mercadería",  tipo: "egreso"  },
      "Gastos por Ventas":          { label: "Gastos ventas",     tipo: "egreso"  },
      "Gastos de Comercialización": { label: "Comercialización",  tipo: "egreso"  },
      "Gastos de Administración":   { label: "Administración",    tipo: "egreso"  },
      "Publicidad":                 { label: "Publicidad",        tipo: "egreso"  },
      "Impuestos":                  { label: "Impuestos",         tipo: "egreso"  },
      "Totales":                    { label: "Resultado neto",    tipo: "total"   },
    };

    let appData = null;
    let periodoActivo = null;
    let accessToken = null;
    let tokenClient = null;

    function fmt(n) {
      return "$" + Math.abs(Math.round(n)).toLocaleString("es-AR");
    }

    function fmtPeriodo(p) {
      const [anio, mes] = String(p).split(/[,\.]/);
      const meses = ["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
      return (meses[parseInt(mes)] || mes) + " " + anio;
    }

    function show(id) {
      ["screen-login","screen-loading","screen-error","screen-content"]
        .forEach(s => document.getElementById(s).classList.toggle("hidden", s !== id));
    }

    // ── Google Identity Services ──
    function initGoogle() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: "https://www.googleapis.com/auth/spreadsheets.readonly",
        callback: (resp) => {
          if (resp.error) {
            show("screen-error");
            document.getElementById("error-msg").textContent = "Error de autenticación: " + resp.error;
            return;
          }
          accessToken = resp.access_token;
          // Guardar token en sessionStorage para esta sesión
          sessionStorage.setItem("hechizo_token", accessToken);
          cargarDatos();
        },
      });

      // Si hay token guardado, intentar usarlo directamente
      const savedToken = sessionStorage.getItem("hechizo_token");
      if (savedToken) {
        accessToken = savedToken;
        cargarDatos();
      } else {
        show("screen-login");
      }
    }

    function loginGoogle() {
      tokenClient.requestAccessToken({ prompt: "consent" });
    }

    function cerrarSesion() {
      sessionStorage.removeItem("hechizo_token");
      accessToken = null;
      show("screen-login");
    }

    // ── Leer Sheet ──
    async function cargarDatos() {
      show("screen-loading");
      try {
        const range = encodeURIComponent(SHEET_NAME);
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}`;
        const res = await fetch(url, {
          headers: { Authorization: "Bearer " + accessToken }
        });

        if (res.status === 401) {
          // Token expirado — pedir uno nuevo silenciosamente
          sessionStorage.removeItem("hechizo_token");
          tokenClient.requestAccessToken({ prompt: "" });
          return;
        }

        if (!res.ok) throw new Error("Error " + res.status);

        const json = await res.json();
        procesarDatos(json.values);

      } catch (err) {
        show("screen-error");
        document.getElementById("error-msg").textContent = "No se pudo cargar: " + err.message;
      }
    }

    function procesarDatos(rows) {
      if (!rows || rows.length < 2) throw new Error("Sheet vacío");

      const headers = rows[0];
      const periodos = headers.slice(1).map(p => String(p).trim()).filter(Boolean);

      const valores = {};
      periodos.forEach((p, colIdx) => {
        valores[p] = {};
        for (let r = 1; r < rows.length; r++) {
          const nombre = String(rows[r][0] || "").trim();
          if (!nombre) continue;
          const val = rows[r][colIdx + 1] || "0";
          valores[p][nombre] = parseFloat(String(val).replace(/[^0-9\-\.]/g, "")) || 0;
        }
      });

      appData = {
        periodos,
        ultimo: periodos[periodos.length - 1],
        valores,
        actualizadoEn: new Date().toISOString()
      };

      periodoActivo = appData.ultimo;
      const fecha = new Date(appData.actualizadoEn);
      document.getElementById("updated-label").textContent =
        "Actualizado " + fecha.toLocaleString("es-AR", { day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit" });

      renderTabs();
      mostrar(periodoActivo);
      show("screen-content");
    }

    function renderTabs() {
      document.getElementById("tabs").innerHTML = appData.periodos.map(p => `
        <button class="tab ${p === periodoActivo ? "active" : ""}" onclick="mostrar('${p}')">${fmtPeriodo(p)}</button>
      `).join("");
    }

    function mostrar(periodo) {
      periodoActivo = periodo;
      const vals = appData.valores[periodo];

      document.querySelectorAll(".tab").forEach((t, i) => {
        t.classList.toggle("active", appData.periodos[i] === periodo);
      });

      const ingresos = vals["Ingresos"] || 0;
      const totalKey = Object.keys(vals).find(k => k.toLowerCase().includes("total")) || "Totales";
      const resultado = vals[totalKey] || 0;
      const margen = ingresos ? ((resultado / ingresos) * 100).toFixed(1) : 0;

      const egresos = Object.entries(vals)
        .filter(([k]) => LABELS[k] && LABELS[k].tipo === "egreso")
        .map(([k, v]) => ({ nombre: LABELS[k].label, valor: Math.abs(v) }))
        .sort((a, b) => b.valor - a.valor);

      const maxEgreso = egresos.length ? egresos[0].valor : 1;

      document.getElementById("main-content").innerHTML = `
        <div class="hero-card">
          <div class="hero-label">Resultado neto</div>
          <div class="hero-value">${fmt(resultado)}</div>
          <div class="hero-margin">Margen: <span>${margen}%</span> sobre ingresos</div>
        </div>
        <div class="kpi-row">
          <div class="kpi-card">
            <div class="kpi-label">Ingresos</div>
            <div class="kpi-value">${fmt(ingresos)}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Total egresos</div>
            <div class="kpi-value neg">${fmt(ingresos - resultado)}</div>
          </div>
        </div>
        <div class="section-title">Desglose de egresos</div>
        <div class="breakdown-card">
          ${egresos.map(e => `
            <div class="breakdown-row">
              <div class="breakdown-bar-wrap">
                <div class="breakdown-name">${e.nombre}</div>
                <div class="breakdown-track">
                  <div class="breakdown-fill" style="width:${Math.round((e.valor/maxEgreso)*100)}%"></div>
                </div>
              </div>
              <div class="breakdown-val">${fmt(e.valor)}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    // Esperar a que cargue la librería de Google
    window.addEventListener("load", () => {
      const interval = setInterval(() => {
        if (window.google && window.google.accounts) {
          clearInterval(interval);
          initGoogle();
        }
      }, 100);
    });
  </script>
</body>
</html>
