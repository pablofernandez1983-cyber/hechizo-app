<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#1a0a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hechizo" />
  <title>Hechizo Bijou</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0e0720;
      --surface:  #1a1030;
      --card:     #231540;
      --accent:   #c084fc;
      --accent2:  #818cf8;
      --gold:     #fbbf24;
      --danger:   #f87171;
      --success:  #34d399;
      --text:     #f1e9ff;
      --muted:    #9d8ec0;
      --border:   rgba(192,132,252,0.15);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── header ── */
    header {
      padding: env(safe-area-inset-top, 16px) 20px 0;
      padding-top: calc(env(safe-area-inset-top, 0px) + 20px);
      background: linear-gradient(180deg, #1a0a2e 0%, transparent 100%);
      position: relative;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .brand-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      color: #fff;
      flex-shrink: 0;
    }

    .brand-name {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      letter-spacing: 0.5px;
      color: var(--text);
    }

    .brand-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-left: 46px;
    }

    /* ── period tabs ── */
    .tabs-wrap {
      padding: 16px 20px 0;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs-wrap::-webkit-scrollbar { display: none; }

    .tab {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 500;
    }

    /* ── main content ── */
    main {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── hero card (resultado) ── */
    .hero-card {
      background: linear-gradient(135deg, #2d1060 0%, #1e0a4e 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .hero-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 140px; height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(192,132,252,0.2) 0%, transparent 70%);
    }

    .hero-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .hero-value {
      font-family: 'DM Serif Display', serif;
      font-size: 36px;
      color: var(--text);
      line-height: 1;
      margin-bottom: 4px;
    }

    .hero-margin {
      font-size: 13px;
      color: var(--muted);
    }
    .hero-margin span {
      color: var(--success);
      font-weight: 500;
    }

    /* ── kpi row ── */
    .kpi-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .kpi-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }

    .kpi-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .kpi-value {
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
    }
    .kpi-value.neg { color: var(--danger); }

    /* ── desglose ── */
    .section-title {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .breakdown-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .breakdown-row {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }
    .breakdown-row:last-child { border-bottom: none; }

    .breakdown-bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .breakdown-name {
      font-size: 13px;
      color: var(--text);
    }

    .breakdown-track {
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }

    .breakdown-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--accent);
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }

    .breakdown-val {
      font-size: 13px;
      font-weight: 500;
      color: var(--danger);
      text-align: right;
      white-space: nowrap;
    }

    /* ── footer ── */
    footer {
      padding: 12px 20px;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
      text-align: center;
    }

    .updated-label {
      font-size: 11px;
      color: var(--muted);
    }

    .refresh-btn {
      margin-top: 8px;
      padding: 8px 20px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── loading / error ── */
    .state-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .state-text { font-size: 14px; color: var(--muted); text-align: center; }

    .error-icon { font-size: 32px; }

    .retry-btn {
      margin-top: 8px;
      padding: 10px 24px;
      border-radius: 20px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- LOADING -->
  <div id="screen-loading" class="state-screen">
    <div class="spinner"></div>
    <p class="state-text">Cargando Hechizo...</p>
  </div>

  <!-- ERROR -->
  <div id="screen-error" class="state-screen hidden">
    <div class="error-icon">⚠</div>
    <p class="state-text" id="error-msg">No se pudo cargar la información.</p>
    <button class="retry-btn" onclick="cargarDatos()">Reintentar</button>
  </div>

  <!-- CONTENT -->
  <div id="screen-content" class="hidden">
    <header>
      <div class="brand">
        <div class="brand-icon">H</div>
        <div class="brand-name">Hechizo Bijou</div>
      </div>
      <div class="brand-sub">Estado de resultados</div>
    </header>

    <div class="tabs-wrap" id="tabs"></div>

    <main id="main-content"></main>

    <footer>
      <div class="updated-label" id="updated-label"></div>
      <button class="refresh-btn" onclick="cargarDatos()">↻ Actualizar</button>
    </footer>
  </div>

  <script>
    // ▼▼▼ REEMPLAZÁ ESTA URL CON LA DE TU WEB APP ▼▼▼
    const SCRIPT_URL = "https://script.google.com/macros/s/TU_ID_ACÁ/exec";

    const LABELS = {
      "Ingresos":                  { label: "Ingresos",            tipo: "ingreso" },
      "Costo de Mercaderia":       { label: "Costo mercadería",     tipo: "egreso"  },
      "Costo de Mercadería":       { label: "Costo mercadería",     tipo: "egreso"  },
      "Gastos por Ventas":         { label: "Gastos ventas",        tipo: "egreso"  },
      "Gastos de Comercialización":{ label: "Comercialización",     tipo: "egreso"  },
      "Gastos de Administración":  { label: "Administración",       tipo: "egreso"  },
      "Publicidad":                { label: "Publicidad",           tipo: "egreso"  },
      "Impuestos":                 { label: "Impuestos",            tipo: "egreso"  },
      "Totales":                   { label: "Resultado neto",       tipo: "total"   },
    };

    let appData = null;
    let periodoActivo = null;

    function fmt(n) {
      const abs = Math.abs(Math.round(n));
      return "$" + abs.toLocaleString("es-AR");
    }

    function fmtPeriodo(p) {
      const [anio, mes] = String(p).split(/[,\.]/);
      const meses = ["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
      return (meses[parseInt(mes)] || mes) + " " + anio;
    }

    function mostrar(periodo) {
      periodoActivo = periodo;
      const vals = appData.valores[periodo];

      // tabs
      document.querySelectorAll(".tab").forEach(t => {
        t.classList.toggle("active", t.dataset.p === periodo);
      });

      const ingresos = vals["Ingresos"] || 0;
      const totalKey = Object.keys(vals).find(k => k.toLowerCase().includes("total")) || "Totales";
      const resultado = vals[totalKey] || 0;
      const margen = ingresos ? ((resultado / ingresos) * 100).toFixed(1) : 0;

      const egresos = Object.entries(vals)
        .filter(([k]) => {
          const info = LABELS[k];
          return info && info.tipo === "egreso";
        })
        .map(([k, v]) => ({ nombre: LABELS[k].label, valor: Math.abs(v) }))
        .sort((a, b) => b.valor - a.valor);

      const maxEgreso = egresos.length ? egresos[0].valor : 1;

      document.getElementById("main-content").innerHTML = `
        <div class="hero-card">
          <div class="hero-label">Resultado neto</div>
          <div class="hero-value">${fmt(resultado)}</div>
          <div class="hero-margin">Margen: <span>${margen}%</span> sobre ingresos</div>
        </div>

        <div class="kpi-row">
          <div class="kpi-card">
            <div class="kpi-label">Ingresos</div>
            <div class="kpi-value">${fmt(ingresos)}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Total egresos</div>
            <div class="kpi-value neg">${fmt(ingresos - resultado)}</div>
          </div>
        </div>

        <div class="section-title">Desglose de egresos</div>
        <div class="breakdown-card">
          ${egresos.map(e => `
            <div class="breakdown-row">
              <div class="breakdown-bar-wrap">
                <div class="breakdown-name">${e.nombre}</div>
                <div class="breakdown-track">
                  <div class="breakdown-fill" style="width:${Math.round((e.valor/maxEgreso)*100)}%"></div>
                </div>
              </div>
              <div class="breakdown-val">${fmt(e.valor)}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderTabs() {
      const wrap = document.getElementById("tabs");
      wrap.innerHTML = appData.periodos.map(p => `
        <button class="tab ${p === periodoActivo ? "active" : ""}" data-p="${p}" onclick="mostrar('${p}')">
          ${fmtPeriodo(p)}
        </button>
      `).join("");
    }

    async function cargarDatos() {
      document.getElementById("screen-error").classList.add("hidden");
      document.getElementById("screen-content").classList.add("hidden");
      document.getElementById("screen-loading").classList.remove("hidden");

      try {
        const res = await fetch(SCRIPT_URL + "?t=" + Date.now());
        const json = await res.json();
        if (!json.ok) throw new Error(json.error || "Error desconocido");

        appData = json.data;
        periodoActivo = appData.ultimo;

        const fecha = new Date(appData.actualizadoEn);
        document.getElementById("updated-label").textContent =
          "Actualizado " + fecha.toLocaleString("es-AR", { day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit" });

        renderTabs();
        mostrar(periodoActivo);

        document.getElementById("screen-loading").classList.add("hidden");
        document.getElementById("screen-content").classList.remove("hidden");

      } catch (err) {
        document.getElementById("screen-loading").classList.add("hidden");
        document.getElementById("screen-error").classList.remove("hidden");
        document.getElementById("error-msg").textContent = "No se pudo cargar: " + err.message;
      }
    }

    cargarDatos();
  </script>
</body>
</html>
