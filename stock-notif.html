<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0e0720">
<title>Stock — Hechizo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0720;--card:#231540;--accent:#c084fc;--accent2:#818cf8;
  --danger:#f87171;--success:#34d399;--warning:#fbbf24;
  --text:#f1e9ff;--muted:#9d8ec0;--border:rgba(192,132,252,0.15);
}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column}

/* ── HEADER ── */
header{padding:calc(env(safe-area-inset-top,0px) + 16px) 20px 0;position:sticky;top:0;z-index:20;background:var(--bg)}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.brand-back{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);text-decoration:none;flex-shrink:0;transition:border-color .2s}
.brand-back:hover{border-color:var(--accent)}
.brand-icon{font-size:20px}
.brand-name{font-family:"DM Serif Display",serif;font-size:19px;color:var(--text)}
.brand-sub{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}

/* ── TABS ── */
.tabs-wrap{display:flex;gap:8px;padding-bottom:12px;overflow-x:auto;scrollbar-width:none}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:6px 16px;border-radius:20px;font-size:13px;color:var(--muted);border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .2s;font-family:"DM Sans",sans-serif;-webkit-tap-highlight-color:transparent}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500}

/* ── MAIN ── */
main{flex:1;padding:16px 20px 80px;display:flex;flex-direction:column;gap:12px}
.page{display:none}
.page.active{display:flex;flex-direction:column;gap:12px}

/* ── STAT CARDS ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 12px;text-align:center}
.stat-icon{font-size:20px;margin-bottom:6px}
.stat-num{font-family:"DM Serif Display",serif;font-size:26px;color:var(--text);line-height:1;margin-bottom:4px}
.stat-label{font-size:11px;color:var(--muted)}

/* ── FILTERS ── */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-input{flex:1 1 160px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:13px;color:var(--text);outline:none;font-family:"DM Sans",sans-serif}
.filter-input::placeholder{color:var(--muted)}
.filter-input:focus{border-color:var(--accent)}
.filter-select{flex:1 1 120px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:13px;color:var(--text);outline:none;cursor:pointer;font-family:"DM Sans",sans-serif}
.filter-select:focus{border-color:var(--accent)}
.filters-right{display:flex;gap:8px;flex-wrap:wrap}
.btn-outline{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:8px 14px;border-radius:10px;font-size:12px;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-outline:disabled{opacity:.5;cursor:not-allowed}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:16px;background:var(--card)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;font-weight:500;font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid rgba(192,132,252,0.07);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(192,132,252,0.04)}
.td-muted{color:var(--muted);font-size:12px}
.td-email{color:var(--accent2);word-break:break-all;font-size:12px}
.td-product{font-weight:500;color:var(--text)}
.td-sku{font-size:11px;color:var(--muted);font-family:monospace}

/* ── BADGES ── */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge-pending{background:rgba(251,191,36,.12);color:var(--warning)}
.badge-sent{background:rgba(52,211,153,.12);color:var(--success)}
.badge-canceled{background:rgba(192,132,252,.08);color:var(--muted)}

/* ── ACTION BUTTONS ── */
.btn-action,.btn-send,.btn-restore{background:none;border:none;cursor:pointer;padding:5px 7px;border-radius:8px;font-size:15px;line-height:1;transition:all .2s;-webkit-tap-highlight-color:transparent}
.btn-action{color:var(--muted)}
.btn-action:hover{color:var(--danger);background:rgba(248,113,113,.1)}
.btn-send{color:var(--muted)}
.btn-send:hover{color:var(--accent);background:rgba(192,132,252,.1)}
.btn-restore{color:var(--muted)}
.btn-restore:hover{color:var(--accent2);background:rgba(129,140,248,.1)}

/* ── LOADING / EMPTY ── */
.loading,.empty{padding:40px;text-align:center;color:var(--muted);font-size:13px}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;right:20px;left:20px;max-width:360px;margin:0 auto;background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px 18px;border-radius:12px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;text-align:center}
#toast.show{opacity:1}
#toast.err{border-color:rgba(248,113,113,.4);background:#2a0e1a}

/* ── MOBILE ── */
@media(max-width:600px){
  main{padding:12px 12px 80px}

  /* Cards: 3 en una sola fila, más compactas */
  .stats-row{grid-template-columns:repeat(3,1fr);gap:6px}
  .stat-card{padding:10px 6px;border-radius:12px}
  .stat-icon{font-size:16px;margin-bottom:4px}
  .stat-num{font-size:20px;margin-bottom:2px}
  .stat-label{font-size:10px}

  /* Filtros apilados */
  .filter-input,.filter-select{flex:1 1 100%}
  .filters-right{width:100%}
  .filters-right .btn-outline{flex:1;text-align:center;padding:7px 6px;font-size:11px}

  /* Tabla Clientes: padding reducido, ocultar SKU y Variante */
  #tab-clientes th,#tab-clientes td{padding:8px 8px;font-size:12px}
  #tab-clientes th:nth-child(4),#tab-clientes td:nth-child(4),
  #tab-clientes th:nth-child(5),#tab-clientes td:nth-child(5){display:none}
  .td-email{font-size:11px}
  .td-product{font-size:12px}
  .badge{padding:2px 7px;font-size:10px}

  /* Tabla Productos: padding reducido, todo entra */
  #tab-productos th,#tab-productos td{padding:8px 8px;font-size:12px}
  #tab-productos .td-product{font-size:12px}
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <a href="index.html" class="brand-back" title="Volver al reporte">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </a>
    <div>
      <div class="brand-name">🔔 Notificaciones de Stock</div>
      <div class="brand-sub">Hechizo</div>
    </div>
  </div>
  <div class="tabs-wrap">
    <button class="tab active" onclick="switchTab('clientes',this)">Clientes</button>
    <button class="tab"        onclick="switchTab('productos',this)">Productos</button>
  </div>
</header>

<main>

<!-- ═══ CLIENTES ═══════════════════════════════════════════════════════════ -->
<div id="tab-clientes" class="page active">

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon">📨</div>
      <div class="stat-num" id="stat-sent">—</div>
      <div class="stat-label">Enviadas</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">⏳</div>
      <div class="stat-num" id="stat-pending">—</div>
      <div class="stat-label">Esperando stock</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📦</div>
      <div class="stat-num" id="stat-products">—</div>
      <div class="stat-label">Productos</div>
    </div>
  </div>

  <div class="filters">
    <input class="filter-input" id="f-email"   placeholder="🔍 Cliente"  oninput="applyFilters()">
    <input class="filter-input" id="f-product" placeholder="🔍 Producto" oninput="applyFilters()">
    <select class="filter-select" id="f-status" onchange="applyFilters()">
      <option value="">Todos</option>
      <option value="pending">Esperando Stock</option>
      <option value="sent">Notificado</option>
      <option value="canceled">Cancelado</option>
    </select>
    <div class="filters-right">
      <button class="btn-outline" id="btn-check" onclick="checkStock()">🔄 Verificar Stock</button>
      <button class="btn-outline" onclick="setupWebhook()">⚡ Webhook</button>
      <button class="btn-outline" onclick="exportCSV()">↓ CSV</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Cliente</th>
          <th>Producto</th>
          <th>Variante</th>
          <th>SKU</th>
          <th>Estado</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="clientes-body">
        <tr><td colspan="7" class="loading">Cargando…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ═══ PRODUCTOS ══════════════════════════════════════════════════════════ -->
<div id="tab-productos" class="page">

  <div class="filters">
    <input class="filter-input" id="f-prod-search" placeholder="🔍 Producto o variante" oninput="filterProductos()" style="max-width:360px">
    <div class="filters-right">
      <button class="btn-outline" onclick="exportProductosCSV()">↓ CSV</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Producto</th>
          <th>Stock</th>
          <th>Demanda</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="productos-body">
        <tr><td colspan="5" class="loading">Cargando…</td></tr>
      </tbody>
    </table>
  </div>
</div>

</main>

<div id="toast"></div>

<script>
const API = 'https://hechizo-reporte-nuevo-production.up.railway.app';

let _allClientes  = [];
let _allProductos = [];
let _activeTab    = 'clientes';

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  _activeTab = name;
  if (name === 'productos' && _allProductos.length === 0) loadProductos();
}

// ── Clientes ──────────────────────────────────────────────────────────────

async function loadStats() {
  try {
    const r = await fetch(API + '/notify/stats');
    const d = await r.json();
    if (d.ok) {
      document.getElementById('stat-sent').textContent     = d.sent.toLocaleString('es-AR');
      document.getElementById('stat-pending').textContent  = d.pending.toLocaleString('es-AR');
      document.getElementById('stat-products').textContent = d.productos_esperando.toLocaleString('es-AR');
    }
  } catch(e) {}
}

async function loadClientes() {
  try {
    const r = await fetch(API + '/notify/list');
    const d = await r.json();
    if (d.ok) { _allClientes = d.items; applyFilters(); }
  } catch(e) {
    document.getElementById('clientes-body').innerHTML =
      '<tr><td colspan="7" class="empty">Error al cargar datos</td></tr>';
  }
}

function applyFilters() {
  const email   = document.getElementById('f-email').value.toLowerCase().trim();
  const product = document.getElementById('f-product').value.toLowerCase().trim();
  const status  = document.getElementById('f-status').value;
  renderClientes(_allClientes.filter(r => {
    if (email   && !r.email.toLowerCase().includes(email)) return false;
    if (product && !(r.product_name.toLowerCase().includes(product) ||
        (r.variant_name||'').toLowerCase().includes(product)))  return false;
    if (status  && r.status !== status)                         return false;
    return true;
  }));
}

function renderClientes(items) {
  const tbody = document.getElementById('clientes-body');
  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">Sin resultados</td></tr>';
    return;
  }
  tbody.innerHTML = items.map(r => {
    const fecha = r.created_at
      ? new Date(r.created_at).toLocaleDateString('es-AR',{day:'numeric',month:'numeric'})
      : '—';
    const badge = r.status === 'sent'
      ? '<span class="badge badge-sent">Notificado</span>'
      : r.status === 'canceled'
        ? '<span class="badge badge-canceled">Cancelado</span>'
        : '<span class="badge badge-pending">Esperando</span>';
    const variant = r.variant_name ? esc(r.variant_name) : '<span class="td-muted">—</span>';
    const sku     = r.sku ? `<span class="td-sku">${esc(r.sku)}</span>` : '<span class="td-muted">—</span>';
    const actions = r.status === 'canceled'
      ? `<button class="btn-restore" title="Restaurar" onclick="restoreNotif(${r.id})">↩</button>`
      : `<button class="btn-action"  title="Cancelar"  onclick="deleteNotif(${r.id})">⊗</button>`;
    return `<tr>
      <td class="td-muted">${fecha}</td>
      <td><span class="td-email">${esc(r.email)}</span></td>
      <td class="td-product">${esc(r.product_name)}</td>
      <td>${variant}</td>
      <td>${sku}</td>
      <td>${badge}</td>
      <td>${actions}</td>
    </tr>`;
  }).join('');
}

async function deleteNotif(id) {
  if (!confirm('¿Cancelar esta notificación?')) return;
  const r = await fetch(API + '/notify/' + id, {method:'DELETE'});
  const d = await r.json();
  if (d.ok) {
    const item = _allClientes.find(x => x.id === id);
    if (item) item.status = 'canceled';
    applyFilters(); loadStats();
    showToast('Notificación cancelada');
  }
}

async function restoreNotif(id) {
  const r = await fetch(API + '/notify/' + id + '/restore', {method:'POST'});
  const d = await r.json();
  if (d.ok) {
    const item = _allClientes.find(x => x.id === id);
    if (item) { item.status = 'pending'; item.sent_at = null; }
    applyFilters(); loadStats();
    showToast('Notificación restaurada');
  }
}

// ── Productos ─────────────────────────────────────────────────────────────

async function loadProductos() {
  document.getElementById('productos-body').innerHTML =
    '<tr><td colspan="5" class="loading">Cargando desde Tiendanube…</td></tr>';
  try {
    const r = await fetch(API + '/notify/products');
    const d = await r.json();
    if (d.ok) { _allProductos = d.items; renderProductos(_allProductos); }
  } catch(e) {
    document.getElementById('productos-body').innerHTML =
      '<tr><td colspan="5" class="empty">Error al cargar datos</td></tr>';
  }
}

function filterProductos() {
  const q = document.getElementById('f-prod-search').value.toLowerCase().trim();
  renderProductos(_allProductos.filter(r =>
    r.product_name.toLowerCase().includes(q) || (r.variant_name||'').toLowerCase().includes(q)
  ));
}

function renderProductos(items) {
  const tbody = document.getElementById('productos-body');
  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">Sin resultados</td></tr>';
    return;
  }
  tbody.innerHTML = items.map(r => {
    const stock   = r.current_stock != null ? r.current_stock : '<span class="td-muted">—</span>';
    const variant = r.variant_name ? esc(r.variant_name) : '<span class="td-muted">—</span>';
    const demStyle = r.cantidad >= 5 ? `color:var(--accent);font-weight:500` : '';
    return `<tr>
      <td class="td-product">${esc(r.product_name)}</td>
      <td>${stock}</td>
      <td style="${demStyle}">${r.cantidad}</td>
      <td>
        <button class="btn-send"   title="Enviar notificaciones" onclick="sendProduct(${r.product_id},'${esc(r.product_name)}',this)">✈</button>
        <button class="btn-action" title="Descartar solicitudes" onclick="discardProduct(${r.product_id},this)">⊗</button>
      </td>
    </tr>`;
  }).join('');
}

async function sendProduct(productId, productName, btn) {
  if (!confirm(`¿Enviar notificaciones de "${productName}"?`)) return;
  const row = btn.closest('tr');
  row.style.opacity = '.4';
  try {
    const r = await fetch(API + '/notify/send-product/' + productId, {method:'POST'});
    const d = await r.json();
    row.style.opacity = '1';
    if (d.ok) {
      showToast(`✓ ${d.enviados} mail(s) enviado(s)`);
      _allProductos=[]; _allClientes=[]; loadClientes(); loadStats(); loadProductos();
    }
  } catch(e) { row.style.opacity='1'; showToast('Error al enviar', true); }
}

async function discardProduct(productId, btn) {
  if (!confirm('¿Eliminar solicitudes pendientes de este producto?')) return;
  const row = btn.closest('tr');
  row.style.opacity = '.4';
  try {
    const r = await fetch(API + '/notify/product/' + productId, {method:'DELETE'});
    const d = await r.json();
    row.style.opacity = '1';
    if (d.ok) {
      _allProductos = _allProductos.filter(x => x.product_id !== productId);
      _allClientes  = _allClientes.filter(x => !(x.product_id === productId && x.status === 'pending'));
      renderProductos(_allProductos); applyFilters(); loadStats();
      showToast(`Solicitudes eliminadas (${d.eliminados})`);
    }
  } catch(e) { row.style.opacity='1'; showToast('Error al eliminar', true); }
}

// ── Acciones ──────────────────────────────────────────────────────────────

async function checkStock() {
  const btn = document.getElementById('btn-check');
  btn.disabled = true; btn.textContent = '⏳ Verificando…';
  try {
    const r = await fetch(API + '/notify/check-stock', {method:'POST'});
    const d = await r.json();
    if (d.ok) {
      if (d.enviados > 0) {
        showToast(`✓ ${d.enviados} mail(s) enviado(s)`);
        _allClientes=[]; _allProductos=[]; loadClientes(); loadStats();
      } else {
        const stocks = d.stock_encontrado || {};
        const detail = Object.keys(stocks).length
          ? ' · ' + Object.entries(stocks).map(([k,v]) => `v${k}=${v}`).join(', ') : '';
        showToast('Sin stock nuevo para notificar' + detail);
      }
    } else { showToast('Error: ' + (d.error||'desconocido'), true); }
  } catch(e) { showToast('Error al verificar', true); }
  btn.disabled = false; btn.textContent = '🔄 Verificar Stock';
}

async function setupWebhook() {
  if (!confirm('¿Re-registrar webhook en Tiendanube?')) return;
  try {
    const r = await fetch(API + '/tiendanube/setup-webhook');
    const d = await r.json();
    d.ok ? showToast('✓ Webhook registrado') : showToast('Error: ' + JSON.stringify(d.detail||d), true);
  } catch(e) { showToast('Error: ' + e.message, true); }
}

// ── CSV ───────────────────────────────────────────────────────────────────

function exportCSV() {
  const email   = document.getElementById('f-email').value.toLowerCase().trim();
  const product = document.getElementById('f-product').value.toLowerCase().trim();
  const status  = document.getElementById('f-status').value;
  const rows    = _allClientes.filter(r => {
    if (email   && !r.email.toLowerCase().includes(email)) return false;
    if (product && !(r.product_name.toLowerCase().includes(product) || (r.variant_name||'').toLowerCase().includes(product))) return false;
    if (status  && r.status !== status) return false;
    return true;
  });
  const lines = [['Fecha','Email','Producto','Variante','SKU','Estado'].join(','),
    ...rows.map(r => [
      r.created_at ? new Date(r.created_at).toLocaleDateString('es-AR') : '',
      r.email, r.product_name, r.variant_name||'', r.sku||'', r.status
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','))];
  downloadCSV('notificaciones.csv', lines.join('\n'));
}

function exportProductosCSV() {
  const q    = document.getElementById('f-prod-search').value.toLowerCase().trim();
  const rows = _allProductos.filter(r =>
    r.product_name.toLowerCase().includes(q) || (r.variant_name||'').toLowerCase().includes(q)
  );
  const lines = [['Producto','Variante','Stock Actual','Cantidad'].join(','),
    ...rows.map(r => [r.product_name, r.variant_name||'', r.current_stock??'', r.cantidad]
      .map(v => `"${String(v).replace(/"/g,'""')}"`).join(','))];
  downloadCSV('productos-sin-stock.csv', lines.join('\n'));
}

function downloadCSV(filename, content) {
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent('﻿' + content);
  a.download = filename; a.click();
}

// ── Utils ─────────────────────────────────────────────────────────────────

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = isError ? 'err show' : 'show';
  setTimeout(() => t.className = '', 3000);
}

// ── Init ──────────────────────────────────────────────────────────────────

loadStats();
loadClientes();
</script>
</body>
</html>
